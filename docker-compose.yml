services:
  oracle-db:
    image: gvenzl/oracle-free:latest
    container_name: pb_finansista_db
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-f1nans1sta}
      APP_USER: ${DB_APP_USER:-admin_pb}
      APP_USER_PASSWORD: ${DB_APP_PASSWORD:-paw1ewjav1e}
    ports:
      - "${DB_PORT:-1521}:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pb_finansista_backend
    depends_on:
      oracle-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521/${DB_NAME:-FREEPDB1}
      SPRING_DATASOURCE_USERNAME: ${DB_APP_USER:-admin_pb}
      SPRING_DATASOURCE_PASSWORD: ${DB_APP_PASSWORD:-paw1ewjav1e}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: ${MAX_UPLOAD_SIZE:-10MB}
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-15MB}
      APP_SECURITY_JWT_SECRET_KEY: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      APP_SECURITY_JWT_EXPIRATION: ${JWT_EXPIRATION:-1800000}
      APP_SECURITY_JWT_COOKIE_NAME: ${JWT_COOKIE_NAME:-jwt}
      APP_SECURITY_JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-false}
      STORAGE_LOCAL_BASE_DIR: ${STORAGE_DIR:-/data/attachments}
      SPRING_JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      SPRINGDOC_API_DOCS_ENABLED: ${SPRINGDOC_API_DOCS_ENABLED:-true}
      SPRINGDOC_SWAGGER_UI_ENABLED: ${SPRINGDOC_SWAGGER_UI_ENABLED:-true}
      APP_DEMO_DATA_ENABLED: ${DEMO_DATA_ENABLED:-true}
      MANAGEMENT_PORT: ${MANAGEMENT_PORT:-9090}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - attachments:${STORAGE_DIR:-/data/attachments}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${MANAGEMENT_PORT:-9090}/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pb_finansista_frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      APP_BACKEND_URL: ${BACKEND_URL:-http://backend:8080}
      APP_SECURITY_JWT_COOKIE_NAME: ${JWT_COOKIE_NAME:-jwt}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: ${SPRING_MAX_FILE_SIZE:-10MB}
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${SPRING_MAX_REQUEST_SIZE:-15MB}
      SPRING_THYMELEAF_CACHE: ${THYMELEAF_CACHE:-true}
    ports:
      - "${FRONTEND_PORT:-8081}:8081"

volumes:
  oracle-data:
  attachments:
