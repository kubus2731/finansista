# Profil pracy nad frontendem (niezależnie od backendu kolegi).
# Wyłącza walidację schematu Hibernate, dzięki czemu aplikacja startuje
# mimo rozjazdu encji UUID <-> NUMBER (bloker po stronie backendu).
# Baza Oracle z Dockera jest już zmigrowana (Flyway V1-V7), więc DataSource
# i Flyway działają normalnie - widoki Thymeleaf opieramy na mock-serwisach,
# nie na encjach JPA.
#
# Uruchomienie:
#   - IntelliJ: Run config -> Active profiles: mock
#   - Maven:    ./mvnw spring-boot:run -Dspring-boot.run.profiles=mock
spring:
  jpa:
    hibernate:
      ddl-auto: none
