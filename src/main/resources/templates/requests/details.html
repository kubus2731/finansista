<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: page(~{::title}, ~{::content})}">
<head>
    <meta charset="UTF-8">
    <title th:fragment="title">Wnioski &ndash; Finansista PB</title>
</head>
<body>
<section th:fragment="content">

    <nav aria-label="okruszki" class="mb-3">
        <a class="link-success" th:href="@{/requests}">&larr; Wróć do listy</a>
    </nav>

    <h1 class="h3 mb-4" th:text="${request.title}">Tytuł wniosku</h1>

    <div class="card">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">Status</dt>
                <dd class="col-sm-9">
                    <span class="badge" th:classappend="${request.status == 'ACCEPTED'} ? 'text-bg-success'
                        : (${request.status == 'REJECTED'} ? 'text-bg-danger'
                        : (${request.status == 'UNDER_REVIEW' or request.status == 'FORMAL_EVALUATION'} ? 'text-bg-warning'
                        : (${request.status == 'CORRECTION_REQUIRED'} ? 'text-bg-info'
                        : 'text-bg-secondary')))"
                          th:text="#{'status.' + ${request.status}}">STATUS</span>
                </dd>

                <dt class="col-sm-3">Kwota</dt>
                <dd class="col-sm-9" th:text="|${#numbers.formatDecimal(request.amount, 1, 2)} zł|">0,00 zł</dd>

                <dt class="col-sm-3">Wydział</dt>
                <dd class="col-sm-9" th:text="${request.departmentName}">Wydział</dd>

                <dt class="col-sm-3">Wnioskodawca</dt>
                <dd class="col-sm-9" th:text="${request.applicantName}">Wnioskodawca</dd>

                <dt class="col-sm-3">Data utworzenia</dt>
                <dd class="col-sm-9" th:text="${#temporals.format(request.createdAt, 'dd.MM.yyyy')}">01.01.2026</dd>
            </dl>
        </div>
    </div>

</section>
</body>
</html>
