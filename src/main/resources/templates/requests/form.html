<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: page(~{::title}, ~{::content})}">
<head>
    <title th:fragment="title">Nowy wniosek – Finansista PB</title>
</head>
<body>
<section th:fragment="content">
    <h1 class="h3 mb-4">Nowy wniosek</h1>

    <p class="text-secondary">Składasz wniosek z: <strong th:text="${departmentName}">Wydział</strong></p>

    <form th:action="@{/requests}" th:object="${form}" method="post" class="col-lg-8" novalidate>

        <div class="mb-3">
            <label for="title" class="form-label">Tytuł wniosku</label>
            <input type="text" class="form-control" th:field="*{title}"
                th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Opis wniosku</label>
            <textarea class="form-control" rows="4" th:field="*{description}"
                th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <div class="mb-3">
            <label for="amount" class="form-label">Kwota</label>
            <input type="number" step="0.01" min="0.01" class="form-control" th:field="*{amount}"
                th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
        </div>

        <div class="mb-3">
            <label for="costCategoryId" class="form-label">Kategoria wydatku</label>
            <select class="form-select" th:field="*{costCategoryId}"
                th:classappend="${#fields.hasErrors('costCategoryId')} ? 'is-invalid'">
                <option value="" disabled>Wybierz...</option>
                <option value="1">Organizacja Wydarzeń Studenckich</option>
                <option value="2">Nagrody i Stypendia</option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('costCategoryId')}" th:errors="*{costCategoryId}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Zapisz wersję roboczą</button>
        <a th:href="@{/requests}" class="btn btn-outline-secondary">Anuluj</a>
    </form>
</section>
</body>
</html>
