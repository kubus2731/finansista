<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: page(~{::title}, ~{::content})}">
<head>
    <meta charset="UTF-8">
    <title th:fragment="title">Rejestracja &ndash; Finansista PB</title>
</head>
<body>
<section th:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card">
                <div class="card-body p-4">
                    <h1 class="h4 mb-4 text-center">Rejestracja konta</h1>

                    <form th:action="@{/register}" method="post" novalidate>
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <label for="name" class="form-label">Imię</label>
                                <input type="text" class="form-control" id="name" name="name"
                                       autocomplete="given-name" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="surname" class="form-label">Nazwisko</label>
                                <input type="text" class="form-control" id="surname" name="surname"
                                       autocomplete="family-name" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="email" class="form-label">Adres e-mail</label>
                                <input type="email" class="form-control" id="email" name="email"
                                       autocomplete="email" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="phoneNumber" class="form-label">Telefon</label>
                                <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber"
                                       autocomplete="tel" pattern="[0-9]{9}"
                                       aria-describedby="phoneHelp" required>
                                <div id="phoneHelp" class="form-text">9 cyfr, bez spacji.</div>
                            </div>
                            <div class="col-sm-6">
                                <label for="password" class="form-label">Hasło</label>
                                <input type="password" class="form-control" id="password" name="rawPassword"
                                       autocomplete="new-password" minlength="8"
                                       aria-describedby="passHelp" required>
                                <div id="passHelp" class="form-text">Minimum 8 znaków.</div>
                            </div>
                            <div class="col-sm-6">
                                <label for="passwordConfirm" class="form-label">Powtórz hasło</label>
                                <input type="password" class="form-control" id="passwordConfirm"
                                       name="passwordConfirm" autocomplete="new-password" minlength="8" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="roleId" class="form-label">Rola</label>
                                <select class="form-select" id="roleId" name="roleId" required>
                                    <option value="" selected disabled>Wybierz&hellip;</option>
                                    <option value="2">Student</option>
                                    <option value="3">WRSS</option>
                                    <option value="4">Komisja prawna</option>
                                    <option value="5">Dziekanat</option>
                                    <option value="6">Kwestura</option>
                                </select>
                            </div>
                            <div class="col-sm-6">
                                <label for="departmentId" class="form-label">Jednostka / wydział</label>
                                <select class="form-select" id="departmentId" name="departmentId" required>
                                    <option value="" selected disabled>Wybierz&hellip;</option>
                                    <option value="1">Wydział Informatyki PB</option>
                                    <option value="3">Wydział Mechaniczny PB</option>
                                    <option value="5">Wydział Elektryczny PB</option>
                                    <option value="13">Samorząd Studentów PB</option>
                                    <option value="14">Kwestura</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-4">Utwórz konto</button>
                    </form>

                    <p class="text-center text-secondary mt-3 mb-0">
                        Masz już konto?
                        <a class="link-success" th:href="@{/login}">Zaloguj się</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

</section>
</body>
</html>
