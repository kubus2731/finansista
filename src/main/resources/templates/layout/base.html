<!DOCTYPE html>
<!--
  Główny szablon-układ (layout). Pozostałe widoki podłączają się przez:
  <html th:replace="~{layout/base :: page(~{::title}, ~{::content})}">
  i dostarczają własny <title> oraz <section th:fragment="content">.
-->
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="page(pageTitle, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${pageTitle}">Finansista PB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="d-flex flex-column min-vh-100">
    <a class="skip-link visually-hidden-focusable" href="#main-content">Przejdź do treści</a>

    <header th:replace="~{layout/navbar :: navbar}"></header>

    <main id="main-content" role="main" class="container flex-grow-1 py-4">
        <th:block th:replace="${content}">
            <!-- tutaj wstrzykiwana jest treść konkretnego widoku -->
        </th:block>
    </main>

    <footer th:replace="~{layout/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
