spring:
  application:
    name: finansista-frontend
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: 8081
  tomcat:
    # Swallow the rest of an oversized upload body so the error response (redirect
    # z komunikatem) dociera do przeglądarki zamiast ERR_CONNECTION_RESET.
    max-swallow-size: -1

# Base URL of the backend REST API the frontend consumes.
app:
  backend:
    url: http://localhost:8080
  security:
    jwt:
      cookie-name: jwt
