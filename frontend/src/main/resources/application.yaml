spring:
  application:
    name: finansista-frontend
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: admin_pb
    password: paw1ewjav1e
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: false

server:
  port: 8081
  tomcat:
    # Swallow the rest of an oversized upload body so the error response (redirect
    # z komunikatem) dociera do przeglądarki zamiast ERR_CONNECTION_RESET.
    max-swallow-size: -1

# Base URL of the backend REST API the frontend consumes.
app:
  backend:
    url: http://localhost:8080

# TEMPORARY: only needed because the frontend currently component-scans backend
# beans (LocalFileStorage). Remove once the frontend stops booting backend infra.
storage:
  type: local
  local:
    base-dir: ./data/attachments
